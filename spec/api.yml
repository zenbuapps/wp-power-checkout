openapi: 3.0.3
info:
  title: Power Checkout REST API
  description: |
    WooCommerce 結帳整合外掛 REST API，提供金流設定管理、退款操作、電子發票開立/作廢，以及 Shopline Payment Webhook 接收。

    ## 錯誤碼對應規則
    - **400** = 前置（參數）Rules 驗證失敗
    - **403** = 前置（狀態）Rules 不符
    - **404** = 資源找不到
    - **500** = 伺服器內部錯誤（Exception）

    ## 認證
    所有管理端 API 需要 WordPress 登入 Cookie 加上 `X-WP-Nonce` Header。
    Webhook 端點使用 HMAC-SHA256 簽章驗證，不需要 WordPress 認證。
  version: "1.0.28"

servers:
  - url: /wp-json/power-checkout/v1
    description: 主要 API 命名空間
  - url: /wp-json/power-checkout/slp
    description: Shopline Payment Webhook 命名空間
  - url: /wp-json/power-checkout/v1/invoices
    description: 電子發票 API 命名空間

tags:
  - name: Settings
    description: 金流/發票服務設定管理
  - name: Payment
    description: 退款相關操作
  - name: Invoice
    description: 電子發票開立與作廢
  - name: Webhook
    description: Shopline Payment Webhook 接收

components:
  securitySchemes:
    wpNonce:
      type: apiKey
      in: header
      name: X-WP-Nonce
      description: WordPress REST Nonce（`wp_create_nonce('wp_rest')`）

  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: string
          description: 回應代碼
        message:
          type: string
          description: 回應訊息
        data:
          description: 回應資料

    ProviderSummary:
      type: object
      properties:
        id:
          type: string
          example: "shopline_payment_redirect"
        title:
          type: string
          example: "Shopline Payment 線上付款"
        enabled:
          type: string
          enum: ["yes", "no"]
        icon:
          type: string
          format: uri
        method_title:
          type: string
        method_description:
          type: string

    ShoplinePaymentSettings:
      type: object
      properties:
        enabled:
          type: string
          enum: ["yes", "no"]
        title:
          type: string
        description:
          type: string
        icon:
          type: string
          format: uri
        order_button_text:
          type: string
        mode:
          type: string
          enum: [test, prod]
        platformId:
          type: string
        merchantId:
          type: string
        apiKey:
          type: string
        clientKey:
          type: string
        signKey:
          type: string
        apiUrl:
          type: string
          format: uri
        allowPaymentMethodList:
          type: array
          items:
            type: string
            enum: [CreditCard, VirtualAccount, JKOPay, ApplePay, LinePay, ChaileaseBNPL]
        paymentMethodOptions:
          type: object
          additionalProperties:
            type: object
            properties:
              installmentCounts:
                type: array
                items:
                  type: string
        expire_min:
          type: integer
        min_amount:
          type: integer
        max_amount:
          type: integer

    AmegoSettings:
      type: object
      properties:
        id:
          type: string
          example: "amego"
        enabled:
          type: string
          enum: ["yes", "no"]
        title:
          type: string
        description:
          type: string
        icon:
          type: string
          format: uri
        method_title:
          type: string
        mode:
          type: string
          enum: [test, prod]
        invoice:
          type: string
          description: 商家統一編號
        app_key:
          type: string
          description: 光貿 API 金鑰
        tax_rate:
          type: number
          format: float
          example: 0.05
        auto_issue_order_statuses:
          type: array
          items:
            type: string
          description: 自動開立發票的訂單狀態
        auto_cancel_order_statuses:
          type: array
          items:
            type: string
          description: 自動作廢發票的訂單狀態

    InvoiceIssueRequest:
      type: object
      properties:
        provider:
          type: string
          description: 電子發票 Provider ID
          example: "amego"
        invoiceType:
          type: string
          enum: [individual, company, donate]
          description: 發票類型
        individual:
          type: string
          enum: [cloud, barcode, moica, paper]
          description: 個人發票類型
        carrier:
          type: string
          description: 手機條碼載具
        moica:
          type: string
          description: 自然人憑證
        companyName:
          type: string
          description: 公司名稱
        companyId:
          type: string
          description: 公司統編
        donateCode:
          type: string
          description: 捐贈碼
      required:
        - provider

    WebhookPayload:
      type: object
      description: Shopline Payment Webhook 通知內容
      properties:
        eventType:
          type: string
          description: 事件類型
          example: "session.succeeded"
        data:
          type: object
          description: 事件資料（結構依事件類型而異）

security:
  - wpNonce: []

paths:
  /settings:
    get:
      tags: [Settings]
      summary: 取得所有金流/發票/物流設定
      operationId: GetAllSettings
      security:
        - wpNonce: []
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          gateways:
                            type: array
                            items:
                              $ref: "#/components/schemas/ProviderSummary"
                          invoices:
                            type: array
                            items:
                              $ref: "#/components/schemas/ProviderSummary"
                          logistics:
                            type: array
                            items:
                              type: object

  /settings/{provider_id}:
    get:
      tags: [Settings]
      summary: 取得單一服務設定
      operationId: GetProviderSettings
      security:
        - wpNonce: []
      parameters:
        - name: provider_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z_-]+$"
          example: "shopline_payment_redirect"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        description: Provider 設定（結構依 provider 而異）
        "500":
          description: 找不到 Provider
    post:
      tags: [Settings]
      summary: 更新服務設定
      operationId: UpdateProviderSettings
      security:
        - wpNonce: []
      parameters:
        - name: provider_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z_-]+$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: 設定欄位 key-value pairs（依 provider 而異）
      responses:
        "200":
          description: 儲存成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        description: 更新後的完整設定

  /settings/{provider_id}/toggle:
    post:
      tags: [Settings]
      summary: 開關服務
      operationId: ToggleProvider
      security:
        - wpNonce: []
      parameters:
        - name: provider_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z_-]+$"
      responses:
        "200":
          description: 切換成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: string
                        description: provider_id

  /refund:
    post:
      tags: [Payment]
      summary: Gateway 退款
      operationId: Refund
      security:
        - wpNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order_id:
                  type: integer
                  description: 訂單 ID
              required:
                - order_id
      responses:
        "200":
          description: 退款成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "500":
          description: |
            退款失敗，可能原因：
            - 訂單編號不是數字
            - 找不到訂單
            - 訂單已無餘額可退
            - Gateway 不支援退款
            - ATM 不支援退款
            - 中租零卡僅支援全額退款

  /refund/manual:
    post:
      tags: [Payment]
      summary: 手動退款（僅改狀態）
      operationId: ManualRefund
      security:
        - wpNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order_id:
                  type: integer
                  description: 訂單 ID
              required:
                - order_id
      responses:
        "200":
          description: 手動退款成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "500":
          description: 找不到訂單或 order_id 不是數字

  # --- Invoice API (namespace: power-checkout/v1/invoices) ---

  /issue/{order_id}:
    post:
      tags: [Invoice]
      summary: 開立電子發票
      operationId: IssueInvoice
      security:
        - wpNonce: []
      servers:
        - url: /wp-json/power-checkout/v1/invoices
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceIssueRequest"
      responses:
        "200":
          description: 開立成功（或已開立過，回傳已有資料）
          content:
            application/json:
              schema:
                type: object
                description: 發票開立回傳資料
        "500":
          description: 找不到 provider 或訂單

  /cancel/{order_id}:
    post:
      tags: [Invoice]
      summary: 作廢電子發票
      operationId: CancelInvoice
      security:
        - wpNonce: []
      servers:
        - url: /wp-json/power-checkout/v1/invoices
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 作廢成功（或已作廢過，回傳已有資料）
          content:
            application/json:
              schema:
                type: object
                description: 發票作廢回傳資料
        "500":
          description: 找不到 provider 或訂單

  # --- Webhook (namespace: power-checkout/slp) ---

  /webhook:
    post:
      tags: [Webhook]
      summary: Shopline Payment Webhook 接收
      operationId: HandleWebhook
      security: []
      servers:
        - url: /wp-json/power-checkout/slp
      parameters:
        - name: timestamp
          in: header
          required: true
          schema:
            type: string
          description: 毫秒時間戳
        - name: sign
          in: header
          required: true
          schema:
            type: string
          description: HMAC-SHA256 簽章
        - name: apiVersion
          in: header
          required: true
          schema:
            type: string
            enum: [V1]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "200":
          description: 處理成功（始終回傳 200）
        "500":
          description: 處理失敗（找不到訂單等）
